services:
  - type: web
    name: quiet-hours-app
    env: docker
    dockerfilePath: Dockerfile
    plan: starter
    instanceSize: starter
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://your-render-url.onrender.com
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: ${DATABASE_HOST}
      - key: DB_PORT
        value: ${DATABASE_PORT}
      - key: DB_DATABASE
        value: ${DATABASE_NAME}
      - key: DB_USERNAME
        value: ${DATABASE_USERNAME}
      - key: DB_PASSWORD
        value: ${DATABASE_PASSWORD}
      - key: CACHE_STORE
        value: database
      - key: SESSION_DRIVER
        value: database
      - key: FILESYSTEM_DISK
        value: local
      - key: QUEUE_CONNECTION
        value: database
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: smtp.sendgrid.net
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USERNAME
        value: apikey
      - key: MAIL_PASSWORD
        value: ${SENDGRID_API_KEY}
      - key: MAIL_FROM_ADDRESS
        value: no-reply@quiethours.com
      - key: MAIL_FROM_NAME
        value: "Quiet Hours"
      - key: APP_KEY
        value: ${APP_KEY}
      - key: PORT
        value: "10000"
    buildCommand: "docker build -t quiet-hours-app ."
    startCommand: "php artisan serve --host=0.0.0.0 --port=$PORT"
    healthCheckPath: "/"
